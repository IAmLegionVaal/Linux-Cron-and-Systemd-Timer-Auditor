name: Apply audited shell parser fix
on:
  push:
    branches: [fix/audit-shell-parser]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-shell-parser
      - name: Correct and validate shell source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cron_timer_auditor.sh')
          text = path.read_text(encoding='utf-8')
          old = r'value="${value//"/""}"'
          new = r'value="${value//\"/\"\"}"'
          if old not in text:
              raise SystemExit('Expected malformed CSV escaping was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          bash -n src/cron_timer_auditor.sh
          shellcheck -S error src/cron_timer_auditor.sh
      - name: Commit validated fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/cron_timer_auditor.sh
          git rm .github/workflows/audit-shell-fix.yml
          git commit -m "fix: correct shell parser error in CSV escaping"
          git push origin HEAD:${GITHUB_REF_NAME}
